name: Build Packages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/dotnet.yml
      - Source/**
      - Source.Native/**
      - Package/Unity/**
      - Package/Unreal/SheetSchemaBuilder/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unity:
    name: Build Unity package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore managed builder
        run: dotnet restore Source/Sheet-Schema-Builder.csproj

      - name: Build managed builder
        run: dotnet build Source/Sheet-Schema-Builder.csproj --configuration Release --no-restore

      - name: Upload Unity package
        uses: actions/upload-artifact@v4
        with:
          name: SheetSchemaBuilder-Unity-Package
          path: Package/Unity
          if-no-files-found: error

  unreal-native:
    name: Build Unreal native package (Win64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore Unreal NativeAOT builder
        run: dotnet restore Source.Native/Sheet-Schema-Builder.Native.csproj -r win-x64

      - name: Publish Unreal NativeAOT builder
        run: dotnet publish Source.Native/Sheet-Schema-Builder.Native.csproj --configuration Release --runtime win-x64 --no-restore

      - name: Verify Unreal native artifacts
        shell: pwsh
        run: |
          $nativeDir = "Package/Unreal/SheetSchemaBuilder/Binaries/ThirdParty/SheetSchemaBuilder/Win64"
          if (-not (Test-Path $nativeDir)) {
            throw "Missing native artifact directory: $nativeDir"
          }

          $nativeFiles = @(Get-ChildItem -Path $nativeDir -File -Filter 'SheetSchemaBuilderNative.dll')
          if ($nativeFiles.Count -eq 0) {
            throw "Missing SheetSchemaBuilderNative.dll in $nativeDir"
          }

          $removedManagedFiles = @(
            "Package/Unreal/SheetSchemaBuilder/Sheet-Schema-Builder.dll",
            "Package/Unreal/SheetSchemaBuilder/Sheet-Schema-Builder.pdb",
            "Package/Unreal/SheetSchemaBuilder/Sheet-Schema-Builder.deps.json",
            "Package/Unreal/SheetSchemaBuilder/Sheet-Schema-Builder.runtimeconfig.json"
          )

          foreach ($file in $removedManagedFiles) {
            if (Test-Path $file) {
              throw "Unexpected managed Unreal artifact exists: $file"
            }
          }

      - name: Upload Unreal package
        uses: actions/upload-artifact@v4
        with:
          name: SheetSchemaBuilder-Unreal-Package-Win64
          path: Package/Unreal/SheetSchemaBuilder
          if-no-files-found: error
