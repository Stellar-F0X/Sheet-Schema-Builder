name: Build Packages

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Unity and Unreal packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore managed builder
        run: dotnet restore Source/Sheet-Schema-Builder.csproj

      - name: Build managed builder
        run: dotnet build Source/Sheet-Schema-Builder.csproj --configuration Release --no-restore

      - name: Restore Unreal NativeAOT builder
        run: dotnet restore Source.Native/Sheet-Schema-Builder.Native.csproj

      - name: Publish Unreal NativeAOT builder
        run: dotnet publish Source.Native/Sheet-Schema-Builder.Native.csproj --configuration Release --no-restore

      - name: Verify Unreal native artifacts
        shell: pwsh
        run: |
          $nativeDir = "Package/Unreal/Binaries/ThirdParty/SheetSchemaBuilder/Win64"
          $requiredFiles = @(
            "$nativeDir/SheetSchemaBuilderNative.dll",
            "$nativeDir/SheetSchemaBuilderNative.lib",
            "$nativeDir/SheetSchemaBuilderNative.pdb"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Missing native artifact: $file"
            }
          }

          $removedManagedFiles = @(
            "Package/Unreal/Sheet-Schema-Builder.dll",
            "Package/Unreal/Sheet-Schema-Builder.pdb",
            "Package/Unreal/Sheet-Schema-Builder.deps.json",
            "Package/Unreal/Sheet-Schema-Builder.runtimeconfig.json"
          )

          foreach ($file in $removedManagedFiles) {
            if (Test-Path $file) {
              throw "Unexpected managed Unreal artifact exists: $file"
            }
          }

      - name: Upload Unity package
        uses: actions/upload-artifact@v4
        with:
          name: SheetSchemaBuilder-Unity-Package
          path: Package/Unity
          if-no-files-found: error

      - name: Upload Unreal package
        uses: actions/upload-artifact@v4
        with:
          name: SheetSchemaBuilder-Unreal-Package
          path: Package/Unreal
          if-no-files-found: error
